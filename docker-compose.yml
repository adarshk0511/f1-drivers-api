services:

  api:
    init: true

    build: .

    profiles:
      - dev
      - monitoring
      - workers

    ports:
      - "5000:5000"

    env_file:
    - .env

    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/f1drivers

    depends_on:
      - mongo

  mongo:

    image: mongo:latest

    ports:
      - "27017:27017"

    profiles:
      - dev
      - monitoring
      - workers

  redis:

    image: redis:latest

    ports:
    - "6379:6379"

    profiles:
      - dev
      - monitoring
      - workers
  
